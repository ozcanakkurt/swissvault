<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SwissVault (SVLT) | Secure Vault on Base</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Segoe UI', sans-serif; background: #0a0f1a; color: #e2e8f0; }
        .hero {
            min-height: 100vh;
            background: radial-gradient(circle at center, #0f172a 0%, #020617 100%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 40px 20px;
        }
        .logo {
            width: 160px;
            height: 160px;
            border-radius: 24px;
            margin-bottom: 30px;
            box-shadow: 0 0 40px rgba(250, 204, 21, 0.3);
        }
        h1 {
            font-size: 4rem;
            color: #facc15;
            margin-bottom: 10px;
            font-weight: 800;
        }
        .tagline {
            font-size: 1.4rem;
            color: #94a3b8;
            margin-bottom: 40px;
        }
        .badges {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            justify-content: center;
            margin-bottom: 40px;
        }
        .badge {
            background: #1e2937;
            border: 1px solid #facc15;
            color: #facc15;
            padding: 8px 18px;
            border-radius: 50px;
            font-size: 0.95rem;
        }
        .contract-box {
            background: #1e2937;
            border: 1px solid #334155;
            border-radius: 16px;
            padding: 20px 30px;
            margin-bottom: 40px;
            max-width: 600px;
            width: 100%;
        }
        .contract-label {
            font-size: 0.9rem;
            color: #94a3b8;
            margin-bottom: 8px;
        }
        .contract-address {
            font-family: monospace;
            font-size: 1.1rem;
            color: #f8fafc;
            word-break: break-all;
        }
        .buttons {
            display: flex;
            gap: 15px;
            flex-wrap: wrap;
            justify-content: center;
        }
        .btn {
            background: #facc15;
            color: #0f172a;
            border: none;
            padding: 14px 28px;
            border-radius: 50px;
            font-weight: 700;
            font-size: 1rem;
            cursor: pointer;
            text-decoration: none;
            transition: 0.2s;
        }
        .btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(250, 204, 21, 0.3);
        }
        .btn-outline {
            background: transparent;
            border: 2px solid #facc15;
            color: #facc15;
        }
    </style>
</head>
<body>
    <div class="hero">
        <img src="https://i.imgur.com/08wJZPo.png" alt="SwissVault Logo" class="logo">
        
        <h1>SwissVault</h1>
        <p class="tagline">Secure Vault on Base</p>
        
        <div class="badges">
            <div class="badge">✓ Built on Base</div>
            <div class="badge">✓ Community Driven</div>
            <div class="badge">✓ LP Coming Soon</div>
        </div>
        
        <div class="contract-box">
            <div class="contract-label">Official Contract Address</div>
            <div class="contract-address">0xa49b52f78ce581aee567c306564c0d4a709fdd7a</div>
        </div>
        
        <div class="buttons">
            <a href="https://basescan.org/token/0xa49b52f78ce581aee567c306564c0d4a709fdd7a" target="_blank" class="btn">BaseScan</a>
            <a href="https://dexscreener.com/base/0xa49b52f78ce581aee567c306564c0d4a709fdd7a" target="_blank" class="btn">DexScreener</a>
            <a href="https://x.com/NavdarScanner" target="_blank" class="btn btn-outline">X</a>
            <a href="https://t.me/SwissVaultOfficial" target="_blank" class="btn btn-outline">Telegram</a>
        </div>
    </div>
</body>
</html>
